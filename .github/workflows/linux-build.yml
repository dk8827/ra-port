name: Linux build

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-26.04

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config libsdl2-dev

      - name: Configure
        run: cmake -S . -B build-linux -G Ninja

      - name: Build
        run: cmake --build build-linux --target redalert_linux -j 3

      - name: Test
        run: tests/run_script_tests.sh
